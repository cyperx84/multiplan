name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o multiplan .

      - name: Eval fixtures (no API keys)
        run: ./multiplan eval eval/fixtures/rate-limiter.json --fixture eval/fixtures/rate-limiter.json --no-judge
